name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  CONTAINER_NAME: media-mcp-server
  CONTAINER_PORT: "3333"
  HOST_PORT: "3333"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        run: |
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "IMAGE_REPO=${IMAGE_REPO}" >> "$GITHUB_ENV"
          echo "IMAGE_SHA=${IMAGE_REPO}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=${IMAGE_REPO}:latest" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_SHA }}
            ${{ env.IMAGE_LATEST }}

      - name: Prepare SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Write runtime env file
        env:
          MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
          APIMART_API_KEY: ${{ secrets.APIMART_API_KEY }}
          APIMART_BASE_URL: ${{ secrets.APIMART_BASE_URL || 'https://api.apimart.ai/v1' }}
        run: |
          test -n "$MCP_AUTH_TOKEN"
          test -n "$APIMART_API_KEY"
          cat > media-mcp-server.env <<EOF
          MCP_SERVER_NAME=media-mcp-server
          MCP_PORT=${CONTAINER_PORT}
          MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
          MEDIA_OUTPUT_DIR=/app/outputs
          APIMART_API_KEY=${APIMART_API_KEY}
          APIMART_BASE_URL=${APIMART_BASE_URL}
          EOF

      - name: Copy runtime env to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          test -n "$DEPLOY_USER"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p /opt/media-mcp-server"
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" media-mcp-server.env "$DEPLOY_USER@$DEPLOY_HOST:/opt/media-mcp-server/.env"

      - name: Deploy container
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" <<EOF
          set -euo pipefail
          docker pull "$IMAGE_SHA"
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            --env-file /opt/media-mcp-server/.env \
            -p "$HOST_PORT:$CONTAINER_PORT" \
            -v media_mcp_outputs:/app/outputs \
            "$IMAGE_SHA"
          docker image prune -f
          EOF
